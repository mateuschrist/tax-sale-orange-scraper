name: Run TaxDeed Scraper

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 7 * * *"
      timezone: "America/New_York"

concurrency:
  group: taxdeed-scraper
  cancel-in-progress: false

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install OS deps (Tesseract OCR)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers + OS deps
        run: |
          python -m playwright install --with-deps

      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run scraper
        env:
          HEADLESS: "true"
          MAX_LOTS: "100"
          SKIP_IF_ADDRESS_NOT_NUMBERED: "true"

          SCRAPER_NAME: "orange_taxdeed"
          COUNTY: "Orange"
          STATE: "FL"
          STATE_KEY: "orange_taxdeed"

          APP_API_BASE: ${{ secrets.APP_API_BASE }}
          APP_API_TOKEN: ${{ secrets.APP_API_TOKEN }}

          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

        run: |
          python engine.py