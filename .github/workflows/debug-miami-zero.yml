name: Debug Miami Zero

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: debug-miami-zero
  cancel-in-progress: true

jobs:
  debug-miami-zero:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      PYTHONUNBUFFERED: "1"
      HEADLESS: "true"
      MIAMI_DEBUG_DIR: "miami_zero_output"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Show environment
        run: |
          python --version
          pip --version
          pwd
          ls -la

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install playwright

      - name: Install Playwright system deps
        run: |
          python -m playwright install --with-deps chromium

      - name: Install Google Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-dependencies: true

      - name: Show browser versions
        run: |
          echo "Chrome path: ${{ steps.chrome.outputs.chrome-path }}"
          echo "Chrome version: ${{ steps.chrome.outputs.chrome-version }}"
          "${{ steps.chrome.outputs.chrome-path }}" --version || true
          python - <<'PY'
          from playwright.sync_api import sync_playwright
          with sync_playwright() as p:
              print("Playwright Chromium executable available:", bool(p.chromium))
          PY

      - name: Ensure output directory exists
        run: |
          mkdir -p miami_zero_output

      - name: Check script exists
        run: |
          test -f debug_miami_zero.py
          ls -la

      - name: Run debug scraper
        run: |
          python debug_miami_zero.py
        continue-on-error: true

      - name: List generated files
        if: always()
        run: |
          echo "=== ROOT ==="
          ls -la || true
          echo "=== miami_zero_output ==="
          ls -la miami_zero_output || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: miami-zero-artifacts
          if-no-files-found: warn
          retention-days: 7
          path: |
            miami_zero_output/**
            **/*miami_zero*.json
            **/*miami_zero*.html
            **/*miami_zero*.png

      - name: Write summary
        if: always()
        run: |
          {
            echo "## Debug Miami Zero"
            echo ""
            echo "- Artifact: \`miami-zero-artifacts\`"
            echo "- Main report: \`miami_zero_output/miami_zero_report.json\`"
          } >> "$GITHUB_STEP_SUMMARY"
