name: Debug Miami Access

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: debug-miami-access
  cancel-in-progress: true

jobs:
  debug-miami-access:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      PYTHONUNBUFFERED: "1"
      HEADLESS: "true"
      MIAMI_DEBUG_DIR: "miami_access_output"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Show environment
        run: |
          python --version
          pip --version
          pwd
          ls -la

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install playwright

      - name: Install Playwright browser deps
        run: |
          python -m playwright install --with-deps chromium

      - name: Install Google Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Show Chrome info
        run: |
          echo "Chrome path: ${{ steps.setup-chrome.outputs.chrome-path }}"
          "${{ steps.setup-chrome.outputs.chrome-path }}" --version || true

      - name: Ensure output folder exists
        run: |
          mkdir -p miami_access_output

      - name: Check script exists
        run: |
          test -f debug_miami_access.py
          ls -la

      - name: Run access probe
        run: |
          python debug_miami_access.py
        continue-on-error: true

      - name: List generated files
        if: always()
        run: |
          echo "=== ROOT ==="
          ls -la || true
          echo "=== miami_access_output ==="
          ls -la miami_access_output || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: miami-access-artifacts
          if-no-files-found: warn
          retention-days: 7
          path: |
            miami_access_output/**
            **/*miami_access*.json
            **/*miami_access*.html
            **/*miami_access*.png

      - name: Write summary
        if: always()
        run: |
          {
            echo "## Debug Miami Access"
            echo ""
            echo "- Artifact: \`miami-access-artifacts\`"
            echo "- Main report: \`miami_access_output/miami_access_report.json\`"
          } >> "$GITHUB_STEP_SUMMARY"
